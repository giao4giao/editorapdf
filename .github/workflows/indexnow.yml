name: IndexNow

# Notify IndexNow (Bing + other participating engines) to recrawl the site after a
# successful PRODUCTION deployment.
#
# STREAMING (not batch): on each deploy we submit ONLY the URLs whose content changed in
# that deploy (derived from the git diff between this and the previous production deploy),
# not the whole sitemap. Bing flags repeated full-sitemap submissions as batch mode, which
# can delay indexing; small, change-driven submissions are the recommended pattern.
#
# A manual run (workflow_dispatch) does a full sitemap submission, for the rare case where
# you intentionally want to (re)submit everything. The IndexNow key is public, so no
# secrets are needed.
on:
  deployment_status:
  workflow_dispatch:

permissions:
  contents: read
  deployments: read

concurrency:
  group: indexnow
  cancel-in-progress: false

jobs:
  submit:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (github.event.deployment_status.state == 'success' &&
       github.event.deployment_status.environment == 'Production')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (full history for the diff)
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      # Manual run → submit the whole sitemap (intentional full re-submit).
      - name: Full submit (manual dispatch)
        if: github.event_name == 'workflow_dispatch'
        run: node scripts/submit-indexnow.js

      # Production deploy → stream only the URLs that changed since the previous deploy.
      - name: Stream changed URLs (production deploy)
        if: github.event_name == 'deployment_status'
        env:
          GH_TOKEN: ${{ github.token }}
          CUR_SHA: ${{ github.event.deployment.sha }}
          REPO: ${{ github.repository }}
        run: |
          # Previous production deployment's commit (the most recent one that isn't this deploy).
          PREV_SHA=$(gh api "repos/$REPO/deployments?environment=Production&per_page=30" \
            --jq "[.[].sha] | map(select(. != \"$CUR_SHA\")) | .[0] // empty")
          if [ -z "$PREV_SHA" ]; then
            # No prior production deploy on record — fall back to this commit's parent.
            PREV_SHA="${CUR_SHA}^"
          fi
          echo "Diffing $PREV_SHA..$CUR_SHA"
          node scripts/submit-indexnow-changed.js "$PREV_SHA" "$CUR_SHA"
