name: Daily Blog

# Generates brand-new blog posts with the Claude API (matching the existing posts'
# style + on-page SEO) and wires each one into THIS repo's TSX blog system:
#   • app/data/blog/posts/<slug>.tsx + <slug>.i18n.ts   (the post module + translations)
#   • app/data/blog/registry.ts                          (so the [slug] route renders it)
#   • app/data/blog/migrated.ts                          (so it lands in the sitemap)
#   • app/components/BlogIndex.tsx                        (the blog-index card)
#   • app/data/blog/indexContent.ts                      (localized blog-index card text)
#   • app/data/searchIndex.ts                            (related-articles + search)
# then commits those changed files to main. That push triggers the Vercel production
# deploy.
#
# The cron fires daily, but scripts/should-run-blog.mjs gates it down to 2 random days
# per ISO week, so posts are generated only ~twice a week. A manual "Run workflow"
# always generates, regardless of the day.
#
# IndexNow: the existing .github/workflows/indexnow.yml runs on `deployment_status`
# (Vercel production deploys) and submits ONLY the changed URLs per deploy — that path
# fires for the Vercel deploy this push creates, so we do NOT ping IndexNow from here.
# (An earlier fallback step here re-submitted the whole sitemap after every run; Bing
# flagged that as batch mode, so it was removed in favour of the streaming indexnow.yml.)

on:
  schedule:
    - cron: "0 6 * * *" # daily at 06:00 UTC — gated to 2 random days/week below
  workflow_dispatch:
    inputs:
      count:
        description: "How many new posts to generate"
        type: string
        default: "2"

concurrency:
  group: daily-blog
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      # On scheduled runs, only proceed on this week's 2 random days. Manual runs
      # skip the gate (always generate).
      - name: Weekly run gate
        id: gate
        run: echo "run=$(node scripts/should-run-blog.mjs)" >> "$GITHUB_OUTPUT"

      - name: Generate posts
        if: github.event_name == 'workflow_dispatch' || steps.gate.outputs.run == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_MODEL: claude-opus-4-8
        run: node scripts/generate-blog.mjs --count "${{ inputs.count || '2' }}"

      - name: Commit & push
        id: commit
        if: github.event_name == 'workflow_dispatch' || steps.gate.outputs.run == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet; then
            echo "No changes to commit."
            echo "pushed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          DATE=$(date -u +%Y-%m-%d)
          # Commit ONLY the files the generator touches (posts + the six wiring files).
          git add \
            app/data/blog/posts/ \
            app/data/blog/registry.ts \
            app/data/blog/migrated.ts \
            app/components/BlogIndex.tsx \
            app/data/blog/indexContent.ts \
            app/data/searchIndex.ts
          git commit -m "blog: add daily posts ($DATE)"
          git push
          echo "pushed=true" >> "$GITHUB_OUTPUT"

      # IndexNow is handled by indexnow.yml on the Vercel `deployment_status` this push
      # triggers — it streams only the changed URLs. No batch submission from here.
